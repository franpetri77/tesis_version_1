services:
  - type: web
    name: tele-import-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci; npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: DB_PATH
        value: /var/data/tele_import.db
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MP_WEBHOOK_SECRET
        sync: false
      - key: DIRECTUS_URL
        sync: false
      - key: DIRECTUS_SERVICE_TOKEN
        sync: false
    disk:
      name: tele-import-data
      mountPath: /var/data
      sizeGB: 1
